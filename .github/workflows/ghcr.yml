name: GHCR Publish

on:
  push:
    branches: [main, development]
    tags: ['v*']
    paths:
      - 'prime_jennie/**'
      - 'Dockerfile'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'prompts/**'
      - 'scripts/**'
      - 'dags/**'
      - 'migrations/**'
      - 'alembic.ini'
      - 'docker-compose.yml'
  workflow_dispatch:

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/development'
    needs: [build-backend, build-frontend]
    runs-on: self-hosted
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Wait for CI to succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for CI workflow to pass on ${{ github.sha }}..."
          RESULT="pending"
          for i in $(seq 1 45); do
            sleep 10
            RESULT=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&branch=development&per_page=1" \
              --jq 'if .total_count == 0 then "skipped"
                    elif .workflow_runs[0].status == "completed" then
                      if .workflow_runs[0].conclusion == "success" then "success"
                      else "failure"
                      end
                    else "pending"
                    end' 2>/dev/null || echo "pending")
            echo "  Attempt $i: CI = $RESULT"
            if [ "$RESULT" = "success" ]; then
              echo "CI passed!"
              break
            elif [ "$RESULT" = "failure" ]; then
              echo "CI failed — aborting deploy"
              exit 1
            elif [ "$RESULT" = "skipped" ] && [ "$i" -ge 3 ]; then
              echo "CI not triggered (no code changes) — proceeding with deploy"
              break
            fi
          done
          if [ "$RESULT" = "pending" ]; then
            echo "CI did not complete in time — aborting deploy"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Copy .env and Gmail credentials from project
        run: |
          cp /home/youngs75/projects/prime-jennie/.env .env
          cp /home/youngs75/projects/prime-jennie/credentials.json credentials.json 2>/dev/null || true
          cp /home/youngs75/projects/prime-jennie/token.json token.json 2>/dev/null || true

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & deploy
        env:
          COMPOSE_PROJECT_NAME: prime-jennie
        run: |
          echo "Deploying: $(git log --oneline -1)"
          docker compose --profile real pull
          docker compose --profile real up -d
          docker image prune -f || true
          echo ""
          echo "=== Deployment complete ==="
          docker compose --profile infra --profile gpu --profile real ps
